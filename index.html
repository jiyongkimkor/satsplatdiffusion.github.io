<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SatSplat: 3D Satellite Reconstruction</title>
    <style>
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; overflow: hidden; color: white; -webkit-tap-highlight-color: transparent; }
        #header {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100; display: flex; justify-content: space-between; align-items: flex-start;
        }
        h1 { margin: 0; font-size: 1.4rem; font-weight: 700; }
        .subtitle { margin: 4px 0 0; font-size: 0.8rem; color: #aaa; letter-spacing: 0.5px; }
        .workflow { margin-top: 8px; font-size: 0.75rem; color: #007aff; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        #site-selector {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 15px; border-radius: 8px; font-size: 13px; outline: none; cursor: pointer;
        }
        #nav-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; z-index: 100;
        }
        #nav-bar {
            display: flex; gap: 12px; background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(15px); padding: 10px; border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-btn {
            position: relative; padding: 10px 30px; border: none; background: transparent;
            color: white; cursor: pointer; border-radius: 12px;
            font-weight: 600; font-size: 11px; transition: all 0.2s; opacity: 0.3;
            white-space: nowrap; overflow: hidden;
            --progress: 0%;
        }
        .nav-btn::before {
            content: ""; position: absolute; bottom: 0; left: 0; height: 3px;
            width: var(--progress); background: #007aff; transition: width 0.1s ease;
        }
        .nav-btn.active { background: rgba(0, 122, 255, 0.2); opacity: 1 !important; border: 1px solid rgba(0, 122, 255, 0.5); }
        #status-bar { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 1.5px; }
        canvas { display: block; width: 100vw; height: 100vh; outline: none; }
    </style>
</head>
<body>
    <div id="header">
        <div>
            <h1>3D Satellite Reconstruction</h1>
            <p class="subtitle">Traditional Pipeline to Modern Methods</p>
            <p class="workflow">ASP &nbsp; → &nbsp; Skyfall-GS &nbsp; → &nbsp; Ours (Step 1) &nbsp; → &nbsp; Ours (Step 2)</p>
        </div>
        <select id="site-selector" onchange="changeSite(event)">
            <option value="068">JAX_068</option>
            <option value="214">JAX_214</option>
            <option value="251">JAX_251</option>
            <option value="260">JAX_260</option>
        </select>
    </div>

    <div id="nav-container">
        <div id="nav-bar">
            <button id="btn-asp" class="nav-btn" onclick="switchType('asp')">ASP</button>
            <button id="btn-skyfall" class="nav-btn" onclick="switchType('skyfall')">Skyfall-GS</button>
            <button id="btn-step1" class="nav-btn" onclick="switchType('step1')">Ours (Step 1)</button>
            <button id="btn-step2" class="nav-btn" onclick="switchType('step2')">Ours (Step 2)</button>
        </div>
        <div id="status-bar"><span id="status-text">Connecting...</span></div>
    </div>

    <canvas id="mainCanvas"></canvas>

    <script type="module">
        import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@latest";

        let renderer, camera, controls, currentScene;
        let currentSite = "068";
        const scenes = {};
        const BASE_URL = "https://huggingface.co/datasets/jiyong1591/SatSplatDiffusion/resolve/main";

        function getUrl(site, type) {
            let suffix;
            if (type === "asp") suffix = "asp";
            else if (type === "skyfall") suffix = "skyfallgs";
            else suffix = `${type}_baked`;
            return `${BASE_URL}/JAX_${site}_${suffix}.ply?download=true`;
        }

        function updateProgress(type, percent) {
            const btn = document.getElementById(`btn-${type}`);
            if (btn) btn.style.setProperty('--progress', `${percent}%`);
        }

        async function loadSingleModel(site, type) {
            const key = `${site}_${type}`;
            if (scenes[key]) {
                updateProgress(type, 100);
                return scenes[key];
            }

            const scene = new SPLAT.Scene();
            await SPLAT.PLYLoader.LoadAsync(getUrl(site, type), scene, (p) => updateProgress(type, p * 100));
            
            const obj = scene.objects[0];
            if (obj && obj.data && obj.data.positions) {
                const pos = obj.data.positions;
                let minX = Infinity, minY = Infinity, minZ = Infinity, maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
                for (let i = 0; i < pos.length; i += 3) {
                    minX = Math.min(minX, pos[i]); maxX = Math.max(maxX, pos[i]);
                    minY = Math.min(minY, pos[i+1]); maxY = Math.max(maxY, pos[i+1]);
                    minZ = Math.min(minZ, pos[i+2]); maxZ = Math.max(maxZ, pos[i+2]);
                }
                const cX = (minX + maxX) / 2, cY = (minY + maxY) / 2, cZ = (minZ + maxZ) / 2;
                for (let i = 0; i < pos.length; i += 3) {
                    pos[i] -= cX; pos[i+1] -= cY; pos[i+2] -= cZ;
                }
            }
            obj.rotation = SPLAT.Quaternion.FromEuler(new SPLAT.Vector3(Math.PI / 2, 0, 0));
            scenes[key] = scene;
            return scene;
        }

        async function updateSite(site) {
            currentSite = site;
            document.getElementById("status-text").innerText = `Updating Site: ${site}`;
            document.querySelectorAll('.nav-btn').forEach(b => { 
                b.disabled = true; 
                b.style.opacity = "0.3"; 
                b.style.setProperty('--progress', '0%');
            });

            const firstScene = await loadSingleModel(site, "asp");
            if (currentSite === site) {
                currentScene = firstScene;
                switchType("asp");
                document.getElementById("btn-asp").disabled = false;
                document.getElementById("btn-asp").style.opacity = "1";
            }

            const types = ["skyfall", "step1", "step2"];
            for (const type of types) {
                await loadSingleModel(site, type);
                if (currentSite === site) {
                    const btn = document.getElementById(`btn-${type}`);
                    if (btn) {
                        btn.disabled = false;
                        btn.style.opacity = "1";
                    }
                }
            }
            document.getElementById("status-text").innerText = `Site ${site} Ready`;
        }

        window.switchType = (type) => {
            const key = `${currentSite}_${type}`;
            if (!scenes[key]) return;
            currentScene = scenes[key];
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
        };

        window.changeSite = (e) => updateSite(e.target.value);

        async function main() {
            const canvas = document.getElementById("mainCanvas");
            renderer = new SPLAT.WebGLRenderer(canvas);
            camera = new SPLAT.Camera();
            controls = new SPLAT.OrbitControls(camera, canvas);
            camera.position = new SPLAT.Vector3(1.5, -0.8, 0.5);
            controls.setCameraTarget(new SPLAT.Vector3(0, 0, 0));

            const resize = () => renderer.setSize(window.innerWidth, window.innerHeight, 1.0);
            window.addEventListener("resize", resize);
            resize();

            const frame = () => {
                controls.update();
                if (currentScene) renderer.render(currentScene, camera);
                requestAnimationFrame(frame);
            };
            requestAnimationFrame(frame);
            updateSite("068");
        }
        main();
    </script>
</body>
</html>
